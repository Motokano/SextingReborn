<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>残机物语 v1.4 - 数据驱动版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-app">
        <header id="status-bar">
            <div id="time-display">--月--日 --:--</div>
            <div id="loc-display">系统初始化...</div>
        </header>

        <main id="stage">
            <div id="grid-scroll-view">
                <div id="grid-container">
                    <div id="scene-desc">...</div>
                    <div id="action-grid" class="action-grid"></div>
                </div>
            </div>

            <div class="panel-resizer" id="info-panel-resizer"></div>

            <aside id="info-panel">
                <div class="panel-header">
                    <span>信息</span>
                    <button id="info-panel-popout-btn" class="popout-btn">↗</button>
                </div>
                <div id="info-panel-content">
                    <div class="menu-section debug-panel">
                        <div class="menu-title">体征监控</div>
                        <div id="stat-monitor"></div>
                    </div>
                    <div class="menu-section">
                        <button id="inventory-toggle" class="menu-title">物品栏 (<span id="inventory-weight">0/0kg</span>)</button>
                        <div id="inventory-container" class="collapsible">
                            <div id="inventory-list" class="action-brick-container"></div>
                        </div>
                    </div>
                    <div class="menu-section">
                        <div class="menu-title">个人动作</div>
                        <div id="self-options"></div>
                    </div>
                    <div class="menu-section" id="context-section">
                        <div class="menu-title">交互选项</div>
                        <div id="context-options"></div>
                    </div>
                </div>
            </aside>
        </main>

        <div class="panel-resizer" id="log-panel-resizer"></div>
        
        <div id="log-panel">
            <div class="panel-header">
                <span>日志</span>
                <button id="log-panel-popout-btn" class="popout-btn">↗</button>
            </div>
            <div id="log-content"></div>
        </div>

        <div id="sleep-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h2>选择睡眠时间</h2>
                <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                    <input type="range" id="sleep-slider" min="0.5" max="24" step="0.5" value="8" style="flex:1;">
                    <span id="sleep-duration-display" style="font-weight:bold; min-width:30px;">8.0</span>
                    <span>小时</span>
                </div>
                <div style="margin-top:15px;">
                    <button id="sleep-confirm-btn">确认</button>
                    <button id="sleep-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="choice-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h2 id="choice-modal-title"></h2>
                <div id="choice-options" class="action-brick-container" style="max-width:100%; margin-top:15px;"></div>
                <div style="margin-top:20px;">
                    <button id="choice-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="storage-modal" class="modal-overlay hidden">
            <div class="modal-content" style="max-width: 800px; text-align: left;">
                <h2>仓库</h2>
                <div class="storage-ui" style="display: flex; gap: 20px; margin-top: 15px;">
                    <div id="storage-container-view" style="flex: 1;">
                        <h3 style="border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">容器内物品</h3>
                        <div id="storage-container-content" class="action-brick-container"></div>
                    </div>
                    <div id="storage-player-view" style="flex: 1;">
                        <h3 style="border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 10px;">我的物品</h3>
                        <div id="storage-player-content" class="action-brick-container"></div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button id="storage-close-btn">关闭</button>
                </div>
            </div>
        </div>
    </div>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>

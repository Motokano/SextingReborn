<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>残机物语 v1.4 - 数据驱动版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-app">
        <header id="status-bar">
            <canvas id="status-bar-canvas" aria-hidden="true"></canvas>
            <div id="status-bar-content">
                <div id="time-display">--月--日 --:--</div>
                <div id="loc-display">系统初始化...</div>
            </div>
        </header>

        <main id="stage">
            <div id="left-column">
                <div id="grid-scroll-view">
                    <div id="grid-container">
                        <div id="scene-desc">...</div>
                        <div id="action-grid" class="action-grid"></div>
                    </div>
                </div>
                <div class="panel-resizer" id="log-panel-resizer"></div>
                <div id="log-panel">
                    <div class="panel-header">
                        <span>日志</span>
                        <button id="log-panel-popout-btn" class="popout-btn">↗</button>
                    </div>
                    <div id="log-content"></div>
                </div>
            </div>

            <div class="panel-resizer" id="info-panel-resizer"></div>

            <aside id="info-panel">
                <div class="panel-header">
                    <span>信息</span>
                    <button id="info-panel-popout-btn" class="popout-btn">↗</button>
                </div>
                <div id="info-panel-content">
                    <div class="menu-section" id="npc-section" style="display:none;">
                        <div class="menu-title">附近的人</div>
                        <div class="sub-section">
                            <div id="npc-list"></div>
                        </div>
                        <div class="sub-section" id="npc-actions-section">
                            <div class="sub-title" id="npc-actions-title">动作</div>
                            <div id="npc-actions"></div>
                        </div>
                    </div>
                    <div class="menu-section debug-panel" id="state-section">
                        <button type="button" class="menu-title panel-toggle" aria-expanded="true" data-target="state-content"><span class="toggle-icon">▼</span> <span id="self-view-title">当前状态</span></button>
                        <div id="state-content" class="collapsible expanded">
                            <div id="stat-monitor"></div>
                        </div>
                    </div>
                    <div class="menu-section" id="skill-section" style="display:none;">
                        <button type="button" class="menu-title panel-toggle" aria-expanded="false" data-target="skill-content"><span class="toggle-icon">▶</span> 技能</button>
                        <div id="skill-content" class="collapsible">
                            <div id="skill-categories-container"></div>
                        </div>
                    </div>
                    <div class="menu-section" id="combat-section" style="display:none;">
                        <button type="button" class="menu-title panel-toggle" aria-expanded="false" data-target="combat-content"><span class="toggle-icon">▶</span> 战斗</button>
                        <div id="combat-content" class="collapsible">
                            <p class="combat-hint">潜能：<span id="combat-potential-display">—</span>。仅装备的技能可在战斗中使用。</p>
                            <div id="combat-slots-container"></div>
                            <div id="combat-assist-section" class="sub-section" style="margin-top:8px;"></div>
                            <div id="combat-active-container" style="display:none;">
                                <div class="sub-title" style="margin-top:8px;">战斗中</div>
                                <div id="combat-enemy-list" class="combat-enemy-list"></div>
                                <div id="combat-actions-row" class="action-brick-container" style="margin-top:6px;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="menu-section" id="items-section">
                        <button type="button" class="menu-title panel-toggle" aria-expanded="true" data-target="items-content"><span class="toggle-icon">▼</span> 物品 · <span id="inventory-weight">无负担</span></button>
                        <div id="items-content" class="collapsible expanded">
                            <div class="sub-section">
                                <div class="sub-title">随身物品</div>
                                <div id="inventory-list" class="action-brick-container"></div>
                            </div>
                            <div class="sub-section" id="ground-section">
                                <div class="sub-title"><span id="ground-section-title">眼前所见</span> <span id="ground-slots-hint" style="font-weight:normal;color:#888;"></span></div>
                                <div id="ground-items" class="action-brick-container"></div>
                            </div>
                        </div>
                    </div>
                    <div class="menu-section" id="actions-section">
                        <button type="button" class="menu-title panel-toggle" aria-expanded="true" data-target="actions-content"><span class="toggle-icon">▼</span> 行动</button>
                        <div id="actions-content" class="collapsible expanded">
                            <div class="sub-section">
                                <div class="sub-title" id="self-actions-title">可做的事</div>
                                <div id="self-options"></div>
                            </div>
                            <div class="sub-section" id="context-section">
                                <div class="sub-title" id="context-options-title">此处可做</div>
                                <div id="context-options"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>

        <div id="sleep-modal" class="modal-overlay hidden">
            <div class="modal-content">
                <h2>选择睡眠时间</h2>
                <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                    <input type="range" id="sleep-slider" min="0.5" max="24" step="0.5" value="8" style="flex:1;">
                    <span id="sleep-duration-display" style="font-weight:bold; min-width:30px;">8.0</span>
                    <span>小时</span>
                </div>
                <div style="margin-top:15px;">
                    <button id="sleep-confirm-btn">确认</button>
                    <button id="sleep-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="choice-modal" class="modal-overlay hidden">
            <div class="modal-content choice-modal-content">
                <div class="choice-modal-header">
                    <h2 id="choice-modal-title" class="choice-modal-title"></h2>
                    <p id="choice-modal-subtitle" class="choice-modal-subtitle"></p>
                </div>
                <div id="choice-options" class="action-brick-container choice-options"></div>
                <div class="choice-modal-footer">
                    <button type="button" id="choice-cancel-btn" class="choice-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="build-modal" class="modal-overlay hidden">
            <div class="modal-content choice-modal-content choice-modal--list">
                <div class="choice-modal-header">
                    <h2 id="build-modal-title" class="choice-modal-title">建造</h2>
                    <p id="build-modal-subtitle" class="choice-modal-subtitle">选择要建造的建筑（材料不足的将灰显）</p>
                </div>
                <div id="build-options" class="action-brick-container choice-options choice-options--list"></div>
                <div class="choice-modal-footer">
                    <button type="button" id="build-cancel-btn" class="choice-cancel-btn">取消</button>
                </div>
            </div>
        </div>

        <div id="storage-modal" class="modal-overlay hidden">
            <div class="modal-content storage-modal-content">
                <h2 class="storage-modal-title">仓库</h2>
                <div class="storage-ui">
                    <div class="storage-column" id="storage-container-view">
                        <h3 class="storage-column-title">容器内物品</h3>
                        <ul id="storage-container-content" class="storage-list"></ul>
                    </div>
                    <div class="storage-column" id="storage-player-view">
                        <h3 class="storage-column-title">我的物品</h3>
                        <ul id="storage-player-content" class="storage-list"></ul>
                    </div>
                </div>
                <div class="storage-modal-footer">
                    <button type="button" id="storage-close-btn" class="storage-close-btn">关闭</button>
                </div>
            </div>
        </div>

        <div id="combat-modal" class="modal-overlay hidden">
            <div class="modal-content combat-modal-content">
                <h2 class="combat-modal-title">战斗</h2>
                <div id="combat-log-content" class="combat-log-body"></div>
                <div class="combat-modal-footer">
                    <div id="combat-cmd-row" class="action-brick-container"></div>
                </div>
            </div>
        </div>
        <div id="item-tooltip" class="item-tooltip hidden"></div>
    </div>
    <script src="ui.js"></script>
    <script src="cognition.js"></script>
    <script src="game-actions.js"></script>
    <script src="inventory-utils.js"></script>
    <script src="character-utils.js"></script>
    <script src="skill-utils.js"></script>
    <script src="inventory-actions.js"></script>
    <script src="crafting-actions.js"></script>
    <script src="status-actions.js"></script>
    <script src="skill-actions.js"></script>
    <script src="buff-actions.js"></script>
    <script src="effects.js"></script>
    <script src="combat-actions.js"></script>
    <script src="combat.js"></script>
    <script src="language-utils.js"></script>
    <script src="language-actions.js"></script>
    <script src="movement.js"></script>
    <script src="menu-controller.js"></script>
    <script src="item-controller.js"></script>
    <script src="action-dispatcher.js"></script>
    <script src="main.js"></script>
</body>
</html>

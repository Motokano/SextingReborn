<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>残机物语</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-app">
        <header id="status-bar">
            <span id="loc-display">系统初始化...</span>

        <main id="interaction-stage">
            <div id="scene-desc">正在同步意识数据...</div>

        <div id="log-resizer" title="拖动调整日志高度"></div>

        <footer id="log-console">
            <div id="log-content"></div>
        </footer>
    </div>
    <script src="main.js"></script>

</html>
